<main class="lecture-view">
    <div class="container">
        <aside class="lecture-component">
            <app-lecture-component [textPage]="textOutput" [WordsInput]="Words"
                (changePageFromChild)="changePageToFather($event)" (SearchWordFromChild)="setWordToOutput($event)" />
        </aside>
        <section class="dictionary-component">
            <app-dictionary [wordInput]="receiveWordFromChild" [trigger]="receiveWordFromChild" />
            <app-definition-view />
        </section>
    </div>
    <app-lecture-media />
</main>
