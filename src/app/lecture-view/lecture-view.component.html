<main class="lecture-view">
    <div class="container">
        <aside class="lecture-component">
            <app-lecture-component [textPage]="textOutput" [WordsInput]="Words" [wordsMapNoDuplicatedChild]="wordsNoDuplicatedMapOutPut"
                (changePageFromChild)="changePageToFather($event)" (SearchWordFromChild)="setWordToOutput($event)" (sendWordFromChild)="setWordObject($event)"/>
        </aside>
        <section class="dictionary-component">
            <app-dictionary [wordInput]="receiveWordFromChild" [trigger]="receiveWordFromChild" />
            <app-definition-view [word]="wordChild"/>
        </section>
    </div>
    <app-lecture-media />
</main>
